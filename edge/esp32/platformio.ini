[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    ; --- only needed when USE_DHT=1 (DHT22 temp/humidity) ---
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; --- uncomment for real AC IR control (see applyHvacSetpoint) ---
    ; crankyoldgit/IRremoteESP8266 @ ^2.8.6
;
; Sensors are enabled independently — wire only what you have, and the node reports the
; rest honestly (an absent or failed sensor omits its field; nothing is fabricated):
;   -DUSE_SHT30=1 SHT30 on I2C (addr 0x44) -> temperature + humidity
;   -DUSE_CO2=1   ASAIR ACD1200 NDIR on the SAME I2C bus (addr 0x2A) -> CO2 ppm
;   -DUSE_DHT=1   DHT on GPIO4  -> temperature + humidity (fallback; SHT30 wins if both set)
;   -DUSE_PIR=1   PIR on GPIO5  -> measured presence (replaces touch presence)
; I2C defaults to SDA=GPIO21, SCL=GPIO22. Pins/addresses are overridable, e.g.
;   -DI2C_SDA=18 -DI2C_SCL=5 -DSHT30_ADDR=0x45 -DACD1200_ADDR=0x2A
; USE_REAL_SENSORS=1 still works as shorthand for "DHT + PIR".
;
; Pin map (ESP32 DevKit v1):
;   GPIO21 I2C SDA      GPIO22 I2C SCL      GPIO23 lighting relay
;   GPIO19 HVAC IR      GPIO5  PIR          GPIO4  DHT (fallback)
;   GPIO2  status LED   GPIO32 touch presence demo
; The IR emitter is on GPIO19 and must not move back to GPIO22: that is the I2C clock, and
; applyHvacSetpoint() pulses the IR pin, so sharing them makes every setpoint command corrupt
; the SHT30/ACD1200 reads. Overriding I2C onto GPIO19/23 is a compile error, not a silent fault.
;
; Sourcing note (hshop.vn, Ho Chi Minh City): DHT22, MH-Z19 and SCD4x are NOT stocked there.
; Prefer SHT30 (±0.2 °C, ~85k VND) over DHT11 (±2 °C, useless against a 2 °C deadband).
; For DHT11 build with: -DUSE_DHT=1 -DDHT_TYPE=DHT11
;
; !! ACD1200 wiring: its I2C lines are internally pulled up to 5 V (datasheet 2.2) and the
; ESP32 is not 5 V tolerant. Put a bidirectional I2C level shifter between them, or the 5 V
; pull-up will sit on SDA/SCL and can damage the ESP32 (and the 3.3 V SHT30 sharing the bus).
;
; Verify a build before flashing, e.g.:
;   PLATFORMIO_BUILD_FLAGS="-DUSE_SHT30=1 -DUSE_PIR=1" pio run -e esp32dev
;
; Per-device override example (flash one board per zone):
;   build_flags = -DZONE_TOPIC_OVERRIDE=\"zone_2\"  -DUSE_DHT=1 -DUSE_CO2=1
