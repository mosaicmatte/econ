[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    ; --- only needed when USE_REAL_SENSORS=1 (DHT22 temp/humidity) ---
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; --- uncomment for real AC IR control (see applyHvacSetpoint) ---
    ; crankyoldgit/IRremoteESP8266 @ ^2.8.6
; Per-device override example (flash one board per zone):
;   build_flags = -DZONE_TOPIC_OVERRIDE=\"zone_2\"  -DUSE_REAL_SENSORS=1
