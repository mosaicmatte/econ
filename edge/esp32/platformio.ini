[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    ; --- only needed when USE_DHT=1 (DHT22 temp/humidity) ---
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; --- uncomment for real AC IR control (see applyHvacSetpoint) ---
    ; crankyoldgit/IRremoteESP8266 @ ^2.8.6
;
; Sensors are enabled independently — wire only what you have, and the node reports the
; rest honestly (an absent or failed sensor omits its field; nothing is fabricated):
;   -DUSE_DHT=1   DHT22 on GPIO4  -> measured temperature + humidity (pins zone physics)
;   -DUSE_PIR=1   PIR on GPIO5    -> measured presence (replaces touch presence)
;   -DUSE_CO2=1   MH-Z19B on UART2 (rx=GPIO16, tx=GPIO17) -> measured CO2 ppm
; Pins are overridable too, e.g. -DDHT_PIN=18 -DCO2_RX_PIN=25.
; USE_REAL_SENSORS=1 still works as shorthand for "DHT + PIR".
;
; Per-device override example (flash one board per zone):
;   build_flags = -DZONE_TOPIC_OVERRIDE=\"zone_2\"  -DUSE_DHT=1 -DUSE_CO2=1
