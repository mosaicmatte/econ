# ECON broker — authenticated by default.
#
# econ/commands/<zone> carries the messages that close a relay on a 220 V circuit. An
# anonymous listener on that topic means anyone who can reach the building network can
# switch the building. Worse, for a twin that stakes its credibility on never fabricating
# a measurement: anyone can publish econ/telemetry/<zone> with "tempReal": true and feed
# invented physics straight into the identified model.
#
# Run ./setup-mqtt-auth.sh once to mint the password file before first start.
#
# For a throwaway local demo with no hardware attached, mount mosquitto.dev.conf instead
# (see the commented block in docker-compose.yml). That file is anonymous by design and
# says so on its first line.

listener 1883

# No unauthenticated client, ever. Mosquitto refuses to start when the password file is
# missing, which is the correct failure mode — a broker that silently fell back to
# anonymous would be more dangerous than one that does not come up at all.
allow_anonymous false
password_file /mosquitto/config/passwd

# Authentication alone is not enough: it would still let one compromised sensor node
# command every relay in the building. The ACL makes the engine the only publisher of
# commands and confines nodes to telemetry and status.
acl_file /mosquitto/config/acl

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
