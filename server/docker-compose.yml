version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    environment:
      - POSTGRES_PASSWORD=econ
      - POSTGRES_USER=econ
      - POSTGRES_DB=econ
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://econ:econ@db:5432/econ?sslmode=disable
      - MQTT_BROKER=tcp://mqtt:1883
      - FORECAST_URL=http://forecasting:8000  # consumed by /api/forecast proxy
      - DIGITIZER_URL=http://digitizer:8000   # consumed by /api/digitize proxy
      # Set in a .env next to this file for commercial deployments: deploy/rollback of
      # the running building then require this token (X-Admin-Token). Empty = open, for
      # the local demo only.
      - ECON_ADMIN_TOKEN=${ECON_ADMIN_TOKEN:-}
      # Building-local timezone. The APLC plug sweep arms OUTSIDE work hours by the
      # wall clock of the building, not of the container (which defaults to UTC — 7
      # hours off in Vietnam, i.e. armed at lunch, disarmed at midnight).
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      # Deployed buildings, their automatic backups, and the audit log must survive a
      # container rebuild — without this, `docker compose up --build` silently reverts
      # the building to the one baked into the image. Named volume seeds from the image
      # on first creation.
      - server-data:/app/data
    depends_on:
      - db
      - mqtt
      - forecasting

  # Blueprint digitizer (FastAPI): DXF/PDF/image in, building-data.json out, wrapping
  # ai_modules/branch_b_digitization. The dashboard talks to it only through the Go
  # server's /api/digitize proxy, so the frontend keeps a single backend origin.
  digitizer:
    build:
      context: ..
      dockerfile: digitizer/Dockerfile
    ports:
      - "8090:8000"

  # Python LSTM peak-load forecaster (FastAPI). Trains at build time, so it ships with real
  # weights + scaler (no random-init predictions). Independent of db/mqtt. POST /predict,
  # GET /health. Set OPENWEATHER_API_KEY in a .env next to this compose file for live weather;
  # without it the service runs with a flagged fallback (weather_source="fallback").
  forecasting:
    build:
      context: ../backend/forecasting
    ports:
      - "8000:8000"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - WEATHER_LAT=${WEATHER_LAT:-10.7724}
      - WEATHER_LON=${WEATHER_LON:-106.6581}

volumes:
  db-data:
  server-data:
