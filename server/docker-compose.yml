version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    environment:
      - POSTGRES_PASSWORD=ecosync
      - POSTGRES_USER=ecosync
      - POSTGRES_DB=ecosync
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://ecosync:ecosync@db:5432/ecosync?sslmode=disable
    depends_on:
      - db

volumes:
  db-data:
